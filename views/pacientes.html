<div class="pacientes-page">
<header class="header-pacientes">
  <h1>Gerenciamento de Pacientes</h1>
  <button id="btnNovo" class="btn-principal">+ Novo Paciente</button>
</header>

<section class="filtros">
  <input type="text" id="busca" placeholder="Buscar por nome, telefone ou email...">
</section>

<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th>Nome</th>
        <th>Telefone</th>
        <th>Email</th>
        <th>Rua</th>
        <th>N°</th>
        <th>Bairro</th>
        <th>Cidade</th>
        <th>Estado</th>
        <th>Nascimento</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="listaPacientes"></tbody>
  </table>
</div>

<div id="modalPaciente" class="modal">
  <section id="formPaciente" class="form">
    <h2>Novo Paciente</h2>
    <div class="grid-form">
        <input type="text" id="nome" placeholder="Nome *">
        <input type="text" id="telefone" placeholder="Telefone">
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="rua" placeholder="Rua">
        <input type="text" id="numero" placeholder="Nº">
        <input type="text" id="bairro" placeholder="Bairro">
        <input type="text" id="cidade" placeholder="Cidade">
        <input type="text" id="estado" placeholder="Estado">
        <div class="input-group">
            <label for="data_nascimento">Data de Nascimento</label>
            <input type="date" id="data_nascimento">
        </div>
    </div>
    <div class="acoes">
      <button id="salvarPaciente" class="btn-save">Salvar</button>
      <button id="cancelarPaciente" class="btn-cancel">Cancelar</button>
    </div>
  </section>
</div>

<div id="toastContainer" class="toast-container"></div>
</div>
