<div class="profissionais-page">

  <header class="prof-header">
    <h1>Profissionais</h1>

    <button
      id="btnNovoProfissional"
      class="prof-btn-novo"
      type="button">
      Novo Profissional
    </button>
  </header>

  <table class="prof-table">
    <thead>
      <tr>
        <th>Nome</th>
        <th>Especialidade</th>
        <th>Status</th>
        <th>Email</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="listaProfissionais"></tbody>
  </table>

  <!-- MODAL -->
  <div id="modalProfissional" class="prof-modal">

    <form class="prof-form" autocomplete="off">

      <h2>Novo Profissional</h2>

      <div class="prof-group">
        <label for="profNome">Nome *</label>
        <input
          id="profNome"
          name="nome"
          type="text"
          class="prof-input-nome"
          autocomplete="off">
      </div>

      <div class="prof-group">
        <label for="profEspecialidade">Especialidade *</label>
        <input
          id="profEspecialidade"
          name="especialidade"
          type="text"
          class="prof-input-especialidade"
          autocomplete="off">
      </div>

      <div class="prof-group">
        <label for="profStatus">Status</label>
        <select
          id="profStatus"
          name="ativo"
          class="prof-select-ativo">

          <option value="1">Ativo</option>
          <option value="0">Inativo</option>
        </select>
      </div>

      <div class="prof-group">
        <label for="profEmail">Email *</label>
        <input
          id="profEmail"
          name="email"
          type="email"
          class="prof-input-email"
          autocomplete="off">
      </div>

      <div class="prof-group">
        <label for="profSenha">Senha *</label>
        <input
          id="profSenha"
          name="senha"
          type="password"
          class="prof-input-senha"
          autocomplete="new-password">
      </div>

      <div class="prof-group">
        <label for="profNivel">Nível *</label>
        <select
          id="profNivel"
          name="nivel"
          class="prof-select-nivel">

          <option value="profissional">Profissional</option>
          <option value="recepcao">Recepção</option>
          <option value="admin">Admin</option>
        </select>
      </div>

     <div class="prof-form-acoes">
  <button
    type="button"
    class="prof-btn-cancelar">
    Cancelar
  </button>

  <button
    type="button"
    class="prof-btn-salvar"
    data-id="">
    Salvar
  </button>
</div>
      </div>

    </form>
  </div>
