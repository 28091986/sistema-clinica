<div class="container-atendimento">
    <section class="paciente-info card">
        <div class="header-paciente">
            <h2>Prontuário de Atendimento</h2>
            <button id="btnHistorico" type="button" class="btn-secundario">
                Ver Histórico 
            </button>
        </div>
        <div class="dados-paciente">
            </div>
    </section>

    <form id="formAtendimento" class="card" style=>
        <input type="hidden" name="consulta_id">
        <input type="hidden" name="paciente_id">

        <div class="label-float">
            <textarea name="queixa_principal" rows="3" placeholder=" " required></textarea>
            <label>Queixa Principal</label>
        </div>

        <div class="label-float">
            <textarea name="diagnostico" rows="3" placeholder=" " required></textarea>
            <label>Diagnóstico</label>
        </div>

        <div class="label-float">
            <textarea name="conduta" rows="3" placeholder=" "></textarea>
            <label>Conduta e Prescrição</label>
        </div>

        <div class="label-float">
            <textarea name="observacoes" rows="2" placeholder=" "></textarea>
            <label>Observações Internas</label>
        </div>

        <button type="submit" class="btn-principal">Finalizar Atendimento</button>
    </form>
</div>
