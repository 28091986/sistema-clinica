<div class="agendamentos-page">
<header class="header-agendamentos">
  <h1>Agendamentos</h1>
  <button id="btnNovaConsulta" class="btn-save">+ Nova Consulta</button>
</header>

<section class="filtros">
  <input type="text" id="busca" placeholder="Buscar consulta...">
  <input type="date" id="filtroData">
</section>

<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th>Paciente</th>
        <th>Data</th>
        <th>Hora</th>
        <th>Tipo</th>
        <th>Especialidade</th>
        <th>Profissional</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="listaConsultas"></tbody>
  </table>
  <div id="menuAcoes" class="menu-acoes">
    <ul>
      <li id="editarConsulta">Editar</li>
      <li id="excluirConsulta">Excluir</li>
      <li id="realizarConsulta">Realizar Consulta</li>
    </ul>
  </div>
</div>


<div id="modalConsulta" class="modal">
  <div class="modal-content">
    <h2>Agendar Consulta</h2>
    <form id="formConsulta" class="form">
      <label>Paciente *</label>
      <select id="paciente_id" required></select>

      <label>Profissional *</label>
      <select id="profissional_id" required></select>

      <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
          <label>Data *</label>
          <input type="date" id="data" required>
        </div>
        <div style="flex: 1;">
          <label>Hora *</label>
          <input type="time" id="hora" required>
        </div>
      </div>

      <label>Tipo</label>
      <select id="tipo">
        <option value="Consulta">Consulta</option>
        <option value="Retorno">Retorno</option>
        <option value="Avaliação Neuropsicológica">Avaliação Neuropsicológica</option>
        <option value="Avaliação Neuropsicológica Personalizada">Avaliação Neuropsicológica Personalizada</option>
      </select>

      <label>Status</label>
      <select id="status">
        <option value="Agendada">Agendada</option>
        <option value="Realizada">Realizada</option>
        <option value="Cancelada">Cancelada</option>
        <option value="Faltou">Faltou</option>
      </select>

      <label>Observações</label>
      <textarea id="observacoes" rows="3" placeholder="Notas da consulta..."></textarea>

      <div class="acoes">
        <button type="button" id="cancelarConsulta" class="btn-cancel">Cancelar</button>
        <button type="submit" class="btn-save">Salvar</button>
      </div>
    </form>
  </div>
</div>

</div>
